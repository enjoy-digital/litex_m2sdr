name: build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake cppcheck pkg-config libsdl2-dev libgl1-mesa-dev libpng-dev libsoapysdr-dev soapysdr-tools libsndfile1-dev libsamplerate0-dev
      - name: Fetch pinned cimgui submodule
        run: git submodule update --init --recursive litex_m2sdr/software/user/cimgui
      - name: Build user (PCIe)
        run: make -C litex_m2sdr/software/user clean all
      - name: Check optional GUI utilities
        run: |
          test -x litex_m2sdr/software/user/m2sdr_check
          test -x litex_m2sdr/software/user/m2sdr_scan
      - name: Check libm2sdr exported symbols
        run: |
          nm -D --defined-only litex_m2sdr/software/user/libm2sdr/libm2sdr.so.1 | grep -q " m2sdr_get_transport$"
          nm -D --defined-only litex_m2sdr/software/user/libm2sdr/libm2sdr.so.1 | grep -q " m2sdr_get_eb_handle$"
      - name: Run libm2sdr unit checks (PCIe)
        run: make -C litex_m2sdr/software/user test-libm2sdr
      - name: Build libm2sdr with ASan/UBSan
        run: |
          make -C litex_m2sdr/software/user clean \
            libm2sdr/libm2sdr.a test-libm2sdr \
            EXTRA_CFLAGS="-O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer" \
            EXTRA_LDFLAGS="-fsanitize=address,undefined"
      - name: Run cppcheck on libm2sdr
        run: make -C litex_m2sdr/software/user analyze-libm2sdr
      - name: Build examples (PCIe)
        run: make -C litex_m2sdr/software/user examples
      - name: Build Soapy (PCIe)
        run: |
          cmake -S litex_m2sdr/software/soapysdr -B litex_m2sdr/software/soapysdr/build
          cmake --build litex_m2sdr/software/soapysdr/build
      - name: Build user (LiteETH)
        run: make -C litex_m2sdr/software/user clean all INTERFACE=USE_LITEETH
      - name: Run libm2sdr unit checks (LiteETH)
        run: make -C litex_m2sdr/software/user test-libm2sdr INTERFACE=USE_LITEETH
      - name: Build Soapy (LiteETH)
        run: |
          cmake -S litex_m2sdr/software/soapysdr -B litex_m2sdr/software/soapysdr/build_liteeth -DM2SDR_ENABLE_LITEPCIE=OFF -DM2SDR_ENABLE_LITEETH=ON
          cmake --build litex_m2sdr/software/soapysdr/build_liteeth
      - name: Probe fake LiteEth target with Soapy
        run: |
          python3 litex_m2sdr/software/user/tests/test_fake_liteeth.py \
            --m2sdr-util litex_m2sdr/software/user/m2sdr_util \
            --soapy-util SoapySDRUtil \
            --soapy-plugin-dir litex_m2sdr/software/soapysdr/build_liteeth

  cmake-liteeth:
    name: cmake-liteeth (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Configure macOS loopback alias for fake LiteEth target
        if: runner.os == 'macOS'
        run: sudo ifconfig lo0 alias 127.0.0.2 255.255.255.255
      - name: Configure Ethernet-only user stack
        run: cmake -S litex_m2sdr/software/user -B litex_m2sdr/software/user/build-liteeth -DM2SDR_ENABLE_LITEPCIE=OFF -DM2SDR_ENABLE_LITEETH=ON -DM2SDR_BUILD_SOAPY=OFF
      - name: Build Ethernet-only user stack
        run: cmake --build litex_m2sdr/software/user/build-liteeth --config Release
      - name: Test Ethernet-only user stack
        run: ctest --test-dir litex_m2sdr/software/user/build-liteeth --output-on-failure -C Release

  cmake-liteeth-soapy:
    name: cmake-liteeth-soapy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Configure macOS loopback alias for fake LiteEth target
        if: runner.os == 'macOS'
        run: sudo ifconfig lo0 alias 127.0.0.2 255.255.255.255
      - name: Install SoapySDR dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsoapysdr-dev soapysdr-tools
      - name: Install SoapySDR dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install soapysdr
      - name: Configure Ethernet-only Soapy stack
        run: cmake -S litex_m2sdr/software/user -B litex_m2sdr/software/user/build-liteeth-soapy -DM2SDR_ENABLE_LITEPCIE=OFF -DM2SDR_ENABLE_LITEETH=ON -DM2SDR_BUILD_SOAPY=ON
      - name: Build Ethernet-only Soapy stack
        run: cmake --build litex_m2sdr/software/user/build-liteeth-soapy --config Release
      - name: Verify Soapy fake-target test is registered
        run: ctest --test-dir litex_m2sdr/software/user/build-liteeth-soapy -N | grep -q test_fake_liteeth_soapy
      - name: Test Ethernet-only Soapy stack
        run: ctest --test-dir litex_m2sdr/software/user/build-liteeth-soapy --output-on-failure -C Release

  cmake-liteeth-soapy-windows:
    name: cmake-liteeth-soapy (windows-latest, MSYS2 UCRT64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          pacboy: >-
            gcc:p
            cmake:p
            ninja:p
            soapysdr:p
            python:p
      - name: Configure Ethernet-only Soapy stack
        shell: msys2 {0}
        run: cmake -S litex_m2sdr/software/user -B litex_m2sdr/software/user/build-liteeth-soapy -G Ninja -DM2SDR_ENABLE_LITEPCIE=OFF -DM2SDR_ENABLE_LITEETH=ON -DM2SDR_BUILD_SOAPY=ON -DCMAKE_BUILD_TYPE=Release
      - name: Build Ethernet-only Soapy stack
        shell: msys2 {0}
        run: cmake --build litex_m2sdr/software/user/build-liteeth-soapy
      - name: Verify Soapy fake-target test is registered
        shell: msys2 {0}
        run: ctest --test-dir litex_m2sdr/software/user/build-liteeth-soapy -N | grep -q test_fake_liteeth_soapy
      - name: Test Ethernet-only Soapy stack
        shell: msys2 {0}
        run: ctest --test-dir litex_m2sdr/software/user/build-liteeth-soapy --output-on-failure
