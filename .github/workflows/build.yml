name: build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake cppcheck pkg-config libsdl2-dev libgl1-mesa-dev libpng-dev libsoapysdr-dev libsndfile1-dev libsamplerate0-dev
      - name: Fetch pinned cimgui submodule
        run: git submodule update --init --recursive litex_m2sdr/software/user/cimgui
      - name: Build user (PCIe)
        run: make -C litex_m2sdr/software/user clean all
      - name: Check optional GUI utilities
        run: |
          test -x litex_m2sdr/software/user/m2sdr_check
          test -x litex_m2sdr/software/user/m2sdr_scan
      - name: Check libm2sdr exported symbols
        run: |
          nm -D --defined-only litex_m2sdr/software/user/libm2sdr/libm2sdr.so.1 | grep -q " m2sdr_get_transport$"
          nm -D --defined-only litex_m2sdr/software/user/libm2sdr/libm2sdr.so.1 | grep -q " m2sdr_get_eb_handle$"
      - name: Run libm2sdr unit checks (PCIe)
        run: make -C litex_m2sdr/software/user test-libm2sdr
      - name: Build libm2sdr with ASan/UBSan
        run: |
          make -C litex_m2sdr/software/user clean \
            libm2sdr/libm2sdr.a test-libm2sdr \
            EXTRA_CFLAGS="-O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer" \
            EXTRA_LDFLAGS="-fsanitize=address,undefined"
      - name: Run cppcheck on libm2sdr
        run: make -C litex_m2sdr/software/user analyze-libm2sdr
      - name: Build examples (PCIe)
        run: make -C litex_m2sdr/software/user examples
      - name: Build Soapy (PCIe)
        run: |
          cmake -S litex_m2sdr/software/soapysdr -B litex_m2sdr/software/soapysdr/build
          cmake --build litex_m2sdr/software/soapysdr/build
      - name: Build user (LiteETH)
        run: make -C litex_m2sdr/software/user clean all INTERFACE=USE_LITEETH
      - name: Run libm2sdr unit checks (LiteETH)
        run: make -C litex_m2sdr/software/user test-libm2sdr INTERFACE=USE_LITEETH
      - name: Build Soapy (LiteETH)
        run: |
          cmake -S litex_m2sdr/software/soapysdr -B litex_m2sdr/software/soapysdr/build_liteeth -DM2SDR_ENABLE_LITEPCIE=OFF -DM2SDR_ENABLE_LITEETH=ON
          cmake --build litex_m2sdr/software/soapysdr/build_liteeth

  cmake-liteeth:
    name: cmake-liteeth (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Configure Ethernet-only user stack
        run: cmake -S litex_m2sdr/software/user -B litex_m2sdr/software/user/build-liteeth -DM2SDR_ENABLE_LITEPCIE=OFF -DM2SDR_ENABLE_LITEETH=ON -DM2SDR_BUILD_SOAPY=OFF
      - name: Build Ethernet-only user stack
        run: cmake --build litex_m2sdr/software/user/build-liteeth --config Release
      - name: Test Ethernet-only user stack
        if: runner.os != 'Windows'
        run: ctest --test-dir litex_m2sdr/software/user/build-liteeth --output-on-failure -C Release
