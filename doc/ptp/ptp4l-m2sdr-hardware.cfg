# LiteX-M2SDR direct-cable Ethernet PTP master, UDPv4/E2E, host hardware timestamps.
#
# Use only when `ethtool -T <iface>` reports a PTP Hardware Clock and hardware
# transmit/receive timestamp modes. Equivalent command-line flags:
#   ptp4l -i <iface> -4 -E -H -m

[global]
network_transport UDPv4
delay_mechanism E2E
time_stamping hardware

# Keep the exchange easy to observe during board bring-up.
logSyncInterval 0
logMinDelayReqInterval 0
logAnnounceInterval 1
announceReceiptTimeout 3
summary_interval 1
